<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summit</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #222;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #1a3a5c;
      color: #e0f0ff;
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }

    .message.assistant {
      align-self: flex-start;
      background: #1a1a1a;
      border: 1px solid #333;
      border-bottom-left-radius: 4px;
    }

    .message.assistant.streaming {
      border-color: #555;
    }

    .message.error {
      align-self: center;
      background: #3a1a1a;
      border: 1px solid #552222;
      color: #ff9999;
      white-space: pre-wrap;
    }

    /* Markdown content styles */
    .message.assistant p { margin: 0.5em 0; }
    .message.assistant p:first-child { margin-top: 0; }
    .message.assistant p:last-child { margin-bottom: 0; }

    .message.assistant code {
      background: #2a2a2a;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }

    .message.assistant pre {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 16px;
      margin: 8px 0;
      overflow-x: auto;
    }

    .message.assistant pre code {
      background: none;
      padding: 0;
      border-radius: 0;
      font-size: 0.85em;
      line-height: 1.6;
    }

    .message.assistant ul,
    .message.assistant ol {
      margin: 0.5em 0;
      padding-left: 1.5em;
    }

    .message.assistant li { margin: 0.25em 0; }

    .message.assistant blockquote {
      border-left: 3px solid #444;
      padding-left: 12px;
      margin: 0.5em 0;
      color: #999;
    }

    .message.assistant h1,
    .message.assistant h2,
    .message.assistant h3,
    .message.assistant h4 {
      margin: 0.75em 0 0.25em;
      color: #fff;
    }

    .message.assistant h1 { font-size: 1.3em; }
    .message.assistant h2 { font-size: 1.15em; }
    .message.assistant h3 { font-size: 1.05em; }

    .message.assistant table {
      border-collapse: collapse;
      margin: 0.5em 0;
      width: 100%;
    }

    .message.assistant th,
    .message.assistant td {
      border: 1px solid #333;
      padding: 6px 10px;
      text-align: left;
    }

    .message.assistant th {
      background: #222;
      font-weight: 600;
    }

    .message.assistant hr {
      border: none;
      border-top: 1px solid #333;
      margin: 1em 0;
    }

    .message.assistant a {
      color: #60a5fa;
      text-decoration: none;
    }

    .message.assistant a:hover { text-decoration: underline; }

    .thinking-indicator {
      color: #888;
      font-style: italic;
      font-size: 13px;
      padding: 4px 0;
    }

    .thinking-indicator::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    .tool-indicator {
      color: #7c8aff;
      font-size: 12px;
      padding: 2px 8px;
      background: #1a1a2e;
      border-radius: 4px;
      margin: 2px 0;
      display: inline-block;
    }

    .tool-result {
      color: #6b7280;
      font-size: 11px;
      padding: 2px 8px;
      margin: 1px 0 4px;
      font-family: "SF Mono", "Fira Code", monospace;
      white-space: pre-wrap;
      max-height: 60px;
      overflow: hidden;
    }

    .tool-result.error {
      color: #f87171;
    }

    .message-meta {
      font-size: 11px;
      color: #555;
      margin-top: 6px;
      text-align: right;
    }

    #input-area {
      padding: 16px 24px;
      border-top: 1px solid #222;
      display: flex;
      gap: 12px;
    }

    #input {
      flex: 1;
      padding: 12px 16px;
      background: #141414;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
    }

    #input:focus {
      border-color: #555;
    }

    #send {
      padding: 12px 24px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 500;
    }

    #send:hover { background: #1d4ed8; }
    #send:disabled { background: #333; cursor: not-allowed; color: #666; }

    .status {
      text-align: center;
      color: #666;
      font-size: 13px;
      padding: 4px;
    }
  </style>
</head>
<body>
  <header>Summit</header>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Send a message..." autofocus></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    // Configure marked with highlight.js
    marked.setOptions({
      highlight(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: false,
      gfm: true,
    });

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    let ws;
    let currentAssistantEl = null;
    let thinkingEl = null;
    let assistantText = "";

    function renderMarkdown(el, text) {
      el.innerHTML = marked.parse(text);
    }

    function formatToolUse(tool, input) {
      if (!input) return `Using ${tool}`;
      switch (tool) {
        case "Read":
          return `Reading ${input.file_path || "file"}`;
        case "Write":
          return `Writing ${input.file_path || "file"}`;
        case "Edit":
          return `Editing ${input.file_path || "file"}`;
        case "Bash":
          return `Running: ${input.command || "command"}`;
        case "Glob":
          return `Searching files: ${input.pattern || ""}`;
        case "Grep":
          return `Searching for: ${input.pattern || ""}`;
        case "WebFetch":
          return `Fetching ${input.url || "URL"}`;
        case "WebSearch":
          return `Searching: ${input.query || ""}`;
        default:
          const summary = input.file_path || input.command || input.pattern || input.query || "";
          return summary ? `${tool}: ${summary}` : `Using ${tool}`;
      }
    }

    function connect() {
      const protocol = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${protocol}//${location.host}/ws`);

      ws.onopen = () => console.log("Connected");

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        switch (msg.type) {
          case "start":
            assistantText = "";
            currentAssistantEl = null;
            thinkingEl = null;
            break;

          case "thinking":
            if (!thinkingEl) {
              thinkingEl = document.createElement("div");
              thinkingEl.className = "thinking-indicator";
              thinkingEl.textContent = "Thinking";
              messagesEl.appendChild(thinkingEl);
              scrollToBottom();
            }
            break;

          case "tool_use":
            const toolEl = document.createElement("div");
            toolEl.className = "tool-indicator";
            toolEl.textContent = formatToolUse(msg.tool, msg.input);
            messagesEl.appendChild(toolEl);
            scrollToBottom();
            break;

          case "tool_result":
            const resultEl = document.createElement("div");
            resultEl.className = `tool-result${msg.is_error ? " error" : ""}`;
            resultEl.textContent = msg.content || (msg.is_error ? "Error" : "Done");
            messagesEl.appendChild(resultEl);
            scrollToBottom();
            break;

          case "text":
            // Remove thinking indicator once real text arrives
            if (thinkingEl) {
              thinkingEl.remove();
              thinkingEl = null;
            }
            if (!currentAssistantEl) {
              currentAssistantEl = addMessage("", "assistant streaming");
            }
            assistantText += msg.text;
            renderMarkdown(currentAssistantEl, assistantText);
            scrollToBottom();
            break;

          case "result":
            if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
            if (currentAssistantEl) {
              if (!msg.is_error) {
                renderMarkdown(currentAssistantEl, msg.text);
              } else {
                currentAssistantEl.textContent = msg.text;
              }
              currentAssistantEl.classList.remove("streaming");
              // Show stats
              if (msg.duration_ms || msg.cost_usd) {
                const meta = document.createElement("div");
                meta.className = "message-meta";
                const parts = [];
                if (msg.duration_ms) parts.push(`${(msg.duration_ms / 1000).toFixed(1)}s`);
                if (msg.output_tokens) parts.push(`${msg.output_tokens} tokens`);
                if (msg.cost_usd) parts.push(`$${msg.cost_usd.toFixed(4)}`);
                meta.textContent = parts.join(" · ");
                currentAssistantEl.appendChild(meta);
              }
              currentAssistantEl = null;
            }
            setLoading(false);
            break;

          case "done":
            if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
            if (currentAssistantEl) {
              currentAssistantEl.classList.remove("streaming");
              currentAssistantEl = null;
            }
            setLoading(false);
            break;

          case "error":
            if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
            addMessage(msg.text, "error");
            setLoading(false);
            break;
        }
      };

      ws.onclose = () => {
        console.log("Disconnected, reconnecting...");
        setTimeout(connect, 1000);
      };
    }

    function addMessage(text, className) {
      const el = document.createElement("div");
      el.className = `message ${className}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      scrollToBottom();
      return el;
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setLoading(loading) {
      sendBtn.disabled = loading;
      inputEl.disabled = loading;
      if (!loading) inputEl.focus();
    }

    function send() {
      const text = inputEl.value.trim();
      if (!text || sendBtn.disabled) return;

      addMessage(text, "user");
      ws.send(JSON.stringify({ type: "chat", text }));
      inputEl.value = "";
      setLoading(true);
    }

    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    // Auto-resize textarea
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + "px";
    });

    connect();
  </script>
</body>
</html>
